<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Jam</title>
    <meta name="theme-color" content="#101418" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
      body {
        background: #101418;
        color: #d8dde4;
        font-family: 'JetBrains Mono', 'Consolas', 'Menlo', monospace;
        font-size: 14px;
        user-select: none;
        -webkit-user-select: none;
      }

      #app, #game-canvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
      }
      #game-canvas { display: block; }

      #ui-root {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 10;
      }
      #ui-root > * { pointer-events: auto; }

      #boot {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0a0d10;
        z-index: 100;
      }
      #boot h1 {
        font-size: 36px;
        margin: 0;
        letter-spacing: 0.3em;
        color: #d8dde4;
      }
      #boot .hint {
        margin-top: 24px;
        color: #6a7480;
        font-size: 11px;
        letter-spacing: 0.2em;
      }

      #mobile-warn {
        display: none;
        position: fixed;
        inset: 0;
        background: #101418;
        z-index: 1000;
        padding: 32px;
        text-align: center;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
      }
      #mobile-warn h2 { color: #d8dde4; margin: 0; letter-spacing: 0.2em; }
      #mobile-warn p { color: #6a7480; max-width: 320px; line-height: 1.6; }

      @media (hover: none) and (pointer: coarse), (max-width: 768px) {
        #mobile-warn { display: flex; }
        #app, #boot { display: none; }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="game-canvas"></canvas>
      <div id="ui-root"></div>
      <div id="boot">
        <h1>GAME JAM</h1>
        <div class="hint">loading…</div>
      </div>
    </div>

    <div id="mobile-warn">
      <h2>DESKTOP REQUIRED</h2>
      <p>This game needs a keyboard and mouse. Open on desktop to play.</p>
    </div>

    <!-- Vibe Jam 2026 mandatory widget -->
    <script async src="https://vibej.am/2026/widget.js"></script>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
