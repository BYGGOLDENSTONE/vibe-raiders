<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vibe Raiders — Extract or Die</title>
    <meta name="description" content="Browser extraction shooter inspired by Arc Raiders. Loot, fight, extract — built for Cursor Vibe Jam 2026." />
    <meta name="theme-color" content="#0a0707" />

    <meta property="og:title" content="Vibe Raiders" />
    <meta property="og:description" content="A browser extraction shooter. Risk it for the loot, or lose it all." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://vibe-raiders.vercel.app" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Vibe Raiders" />
    <meta name="twitter:description" content="Loot. Fight. Extract. Browser extraction shooter for Vibe Jam 2026." />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <style>
      :root {
        color-scheme: dark;
        --amber: #f3b35a;
        --amber-bright: #ffcc6f;
        --amber-deep: #c97a2a;
        --blood: #b53b2a;
        --bg: #0a0707;
        --fg: #e8d8b8;
        --fg-dim: #8a7a5a;
        --panel: rgba(20, 14, 8, 0.85);
        --panel-border: rgba(243, 179, 90, 0.25);
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
      body {
        background: var(--bg);
        color: var(--fg);
        font-family: 'JetBrains Mono', 'Consolas', 'Menlo', monospace;
        font-size: 14px;
        user-select: none;
        -webkit-user-select: none;
      }

      #app, #game-canvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      #game-canvas { display: block; }

      #ui-root {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 10;
      }
      #ui-root > * { pointer-events: auto; }

      #boot {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: radial-gradient(ellipse at center, #1a0e06 0%, #050302 70%);
        z-index: 100;
      }
      #boot h1 {
        font-size: 48px;
        margin: 0;
        letter-spacing: 0.4em;
        color: var(--amber-bright);
        text-shadow: 0 0 24px rgba(243, 179, 90, 0.4);
      }
      #boot .subtitle {
        margin-top: 12px;
        color: var(--fg-dim);
        letter-spacing: 0.3em;
        font-size: 12px;
      }
      #boot .hint {
        margin-top: 32px;
        color: var(--fg-dim);
        font-size: 11px;
      }

      #mobile-warn {
        display: none;
        position: fixed;
        inset: 0;
        background: var(--bg);
        z-index: 1000;
        padding: 32px;
        text-align: center;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
      }
      #mobile-warn h2 { color: var(--amber); margin: 0; letter-spacing: 0.2em; }
      #mobile-warn p { color: var(--fg-dim); max-width: 320px; line-height: 1.6; }

      @media (hover: none) and (pointer: coarse), (max-width: 768px) {
        #mobile-warn { display: flex; }
        #app, #boot { display: none; }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="game-canvas"></canvas>
      <div id="ui-root"></div>
      <div id="boot">
        <h1>VIBE RAIDERS</h1>
        <div class="subtitle">EXTRACT OR DIE</div>
        <div class="hint">click anywhere to begin</div>
      </div>
    </div>

    <div id="mobile-warn">
      <h2>DESKTOP REQUIRED</h2>
      <p>Vibe Raiders needs a keyboard and mouse. Open this on a desktop browser to play.</p>
    </div>

    <!-- Vibe Jam 2026 mandatory widget -->
    <script async src="https://vibej.am/2026/widget.js"></script>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
